<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sistema de Precios - Reparaciones Celulares</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="config.js"></script>
</head>
<body>
  <h1>Sistema de Precios</h1>

  <!-- Login con Google -->
  <div id="g_id_onload"
       data-client_id="527108731574-nvkf2sovotbn1vtq7fnh42o6ujkt9lj7.apps.googleusercontent.com"
       data-callback="handleCredentialResponse">
  </div>
  <div class="g_id_signin" data-type="standard"></div>

  <!-- Formulario de carga -->
  <form id="formulario">
    <label>Marca:</label>
    <select id="marca"></select>
    <input type="text" id="nuevaMarca" placeholder="Nueva marca (opcional)">
    <br>

    <label>Modelo:</label>
    <select id="modelo"></select>
    <input type="text" id="nuevoModelo" placeholder="Nuevo modelo (opcional)">
    <br>

    <label>Reparación:</label>
    <input type="text" id="reparacion" placeholder="Ej: Cambio pantalla">
    <input type="number" id="precio" placeholder="Precio en $">
    <br>

    <button type="submit">Guardar reparación</button>
  </form>

  <h2>Listado de precios</h2>
  <table border="1" id="tablaPrecios">
    <thead>
      <tr><th>Marca</th><th>Modelo</th><th>Reparación</th><th>Precio</th><th>Usuario</th><th>Fecha</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    let idToken = null;

    function handleCredentialResponse(response) {
      idToken = response.credential;
      cargarListado();
    }

    // Cargar listado desde datos.txt
    async function cargarListado() {
      const res = await fetch(CONFIG.SCRIPT_URL);
      const json = await res.json();
      const tbody = document.querySelector("#tablaPrecios tbody");
      tbody.innerHTML = "";

      if (json.contenido) {
        const lineas = json.contenido.trim().split("\n");
        const marcas = new Set();
        const modelos = new Set();

        lineas.forEach(linea => {
          const partes = linea.split(" | ");
          if (partes.length >= 5) {
            const fecha = partes[0];
            const usuario = partes[1];
            const marca = partes[2];
            const modelo = partes[3];
            const reparacion = partes[4];
            const precio = partes[5] || "";

            marcas.add(marca);
            modelos.add(modelo);

            const tr = document.createElement("tr");
            tr.innerHTML = `<td>${marca}</td><td>${modelo}</td><td>${reparacion}</td><td>${precio}</td><td>${usuario}</td><td>${fecha}</td>`;
            tbody.appendChild(tr);
          }
        });

        // Actualizar selects
        const marcaSelect = document.getElementById("marca");
        marcaSelect.innerHTML = "";
        marcas.forEach(m => {
          const opt = document.createElement("option");
          opt.value = m;
          opt.textContent = m;
          marcaSelect.appendChild(opt);
        });

        const modeloSelect = document.getElementById("modelo");
        modeloSelect.innerHTML = "";
        modelos.forEach(m => {
          const opt = document.createElement("option");
          opt.value = m;
          opt.textContent = m;
          modeloSelect.appendChild(opt);
        });
      }
    }

    // Guardar nueva reparación
    document.getElementById("formulario").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!idToken) {
        alert("Primero inicia sesión con Google");
        return;
      }

      const marca = document.getElementById("nuevaMarca").value || document.getElementById("marca").value;
      const modelo = document.getElementById("nuevoModelo").value || document.getElementById("modelo").value;
      const reparacion = document.getElementById("reparacion").value;
      const precio = document.getElementById("precio").value;

      const data = {
        token: idToken,
        marca: marca,
        modelo: modelo,
        reparacion: reparacion,
        precio: precio
      };

      const res = await fetch(CONFIG.SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify(data)
      });

      const json = await res.json();
      if (json.estado === "ok") {
        cargarListado();
      } else {
        alert("Error al guardar: " + json.error);
      }
    });
  </script>
</body>
</html>
