<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Precios - Reparaciones Celulares</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="config.js"></script>
  <script src="script.js" defer></script>
</head>
<body>
  <div style="display: flex; gap: 10px; position: absolute; top: 15px; right: 15px; z-index: 1000;">
    <a href="vendedor/index.html" style="background: #28a745; color: #fff; text-decoration: none; padding: 8px 12px; border-radius: 8px; font-size: 14px; border: 1px solid #1e7e34;">Panel Vendedor</a>
    <button id="btn-toggle-view" style="position: static; margin: 0;">Versión PC</button>
  </div>
  <h1 style="margin-top: 50px;">Sistema de Precios</h1>

  <!-- Login con Google -->
  <div id="g_id_onload"
       data-client_id="527108731574-nvkf2sovotbn1vtq7fnh42o6ujkt9lj7.apps.googleusercontent.com"
       data-callback="handleCredentialResponse">
  </div>
  <div class="g_id_signin" data-type="standard"></div>

  <!-- Formulario (oculto hasta iniciar sesión) -->
  <form id="formulario" style="display:none;">
    <label>Marca:</label>
    <select id="marca"></select>
    <input type="text" id="nuevaMarca" placeholder="Nueva marca (opcional)">
    <br>

    <label>Modelo:</label>
    <select id="modelo"></select>
    <input type="text" id="nuevoModelo" placeholder="Nuevo modelo (opcional)">
    <br>

    <label>Reparación:</label>
    <input type="text" id="reparacion" placeholder="Ej: Cambio pantalla">
    <input type="number" id="precio" placeholder="Precio en $">
    <br>

    <button type="submit">Guardar reparación</button>
  </form>

  <!-- Buscador -->
  <input type="text" id="buscador" placeholder="Buscar por marca, modelo o reparación...">

  <h2>Listado de precios</h2>
  <!-- Contenedor de tarjetas -->
  <div id="tarjetas"></div>
</body>
</html>
